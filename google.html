<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/babel-standalone@7/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAd82NAfwN5FvYsHlssf1kWPcdlc1Ns_hs&libraries=places"></script>
  <style>
    .pac-container { z-index: 50 !important; }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #map { height: 400px; width: 100%; border-radius: 0.5rem; }
  </style>
</head>
<body class="font-sans bg-gray-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [query, setQuery] = useState('');
      const [businesses, setBusinesses] = useState([]);
      const [loading, setLoading] = useState(false);
      const [noResults, setNoResults] = useState(false);
      let placesService;
      let map;

      useEffect(() => {
        const script = document.createElement('script');
        script.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyAd82NAfwN5FvYsHlssf1kWPcdlc1Ns_hs&libraries=places';
        script.async = true;
        script.defer = true;
        script.onload = () => {
          map = new google.maps.Map(document.createElement('div'), {
            center: { lat: -34.397, lng: 150.644 },
            zoom: 8
          });
          placesService = new google.maps.places.PlacesService(map);
        };
        document.head.appendChild(script);
      }, []);

      const handleSearchInput = (e) => {
        const value = e.target.value.trim();
        setQuery(value);
        if (value.length < 3) {
          setBusinesses([]);
          setNoResults(false);
          return;
        }
        setTimeout(() => searchBusinesses(value), 500);
      };

      const searchBusinesses = (query) => {
        setLoading(true);
        setBusinesses([]);
        setNoResults(false);
        placesService.textSearch({
          query: query,
          fields: ['name', 'formatted_address', 'place_id', 'types', 'rating', 'user_ratings_total', 'photos', 'geometry', 'icon']
        }, (results, status) => {
          if (status === google.maps.places.PlacesServiceStatus.OK && results.length > 0) {
            filterAndDisplayGMB(results);
          } else {
            tryNearbySearch(query);
          }
        });
      };

      const tryNearbySearch = (query) => {
        placesService.nearbySearch({
          keyword: query,
          radius: 5000,
          fields: ['name', 'formatted_address', 'place_id', 'types', 'rating', 'user_ratings_total', 'photos', 'geometry', 'icon']
        }, (results, status) => {
          if (status === google.maps.places.PlacesServiceStatus.OK) {
            filterAndDisplayGMB(results);
          } else {
            setLoading(false);
            setNoResults(true);
          }
        });
      };

      const filterAndDisplayGMB = (businesses) => {
        setLoading(false);
        const gmbBusinesses = businesses.filter(b => 
          b.types && b.types.includes('establishment') && b.name && b.formatted_address
        );
        if (gmbBusinesses.length === 0) {
          setNoResults(true);
          return;
        }
        setBusinesses(gmbBusinesses);
      };

      const loadBusinessDetails = (placeId) => {
        const detailsContainer = document.getElementById(`business-details-${placeId}`);
        detailsContainer.innerHTML = `
          <div class="inline-flex items-center px-3 py-2 border border-transparent text-sm leading-4 font-medium rounded-md text-white bg-blue-300">
            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Loading...
          </div>
        `;
        placesService.getDetails({
          placeId: placeId,
          fields: ['website', 'formatted_phone_number', 'opening_hours', 'photos']
        }, (place, status) => {
          if (status === google.maps.places.PlacesServiceStatus.OK) {
            let detailsHTML = '';
            detailsHTML += place.website 
              ? `<a href="${place.website}" target="_blank" class="inline-flex items-center px-3 py-2 border border-gray-300 shadow-sm text-sm leading-4 font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 mr-2">
                  <svg class="-ml-0.5 mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                  </svg>
                  Visit Website
                 </a>`
              : `<span class="inline-flex items-center px-3 py-2 border border-gray-300 text-sm leading-4 font-medium rounded-md text-gray-500 bg-gray-100 mr-2">
                  <svg class="-ml-0.5 mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                  </svg>
                  No Website
                 </span>`;
            detailsHTML += place.formatted_phone_number 
              ? `<a href="tel:${place.formatted_phone_number}" class="inline-flex items-center px-3 py-2 border border-gray-300 shadow-sm text-sm leading-4 font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 mr-2">
                  <svg class="-ml-0.5 mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                  </svg>
                  ${place.formatted_phone_number}
                 </a>`
              : `<span class="inline-flex items-center px-3 py-2 border border-gray-300 text-sm leading-4 font-medium rounded-md text-gray-500 bg-gray-100 mr-2">
                  <svg class="-ml-0.5 mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                  </svg>
                  No Phone
                 </span>`;
            detailsHTML += place.photos && place.photos.length > 0 
              ? `<button onclick="showPhotoModal('${placeId}')" class="inline-flex items-center px-3 py-2 border border-gray-300 shadow-sm text-sm leading-4 font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                  <svg class="-ml-0.5 mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                  </svg>
                  View Photos
                 </button>`
              : '';
            detailsContainer.innerHTML = detailsHTML;
          } else {
            detailsContainer.innerHTML = `
              <span class="inline-flex items-center px-3 py-2 border border-gray-300 text-sm leading-4 font-medium rounded-md text-gray-500 bg-gray-100">
                Failed to load details
              </span>
            `;
          }
        });
      };

      const showPhotoModal = (placeId) => {
        placesService.getDetails({
          placeId: placeId,
          fields: ['photos']
        }, (place, status) => {
          if (status === google.maps.places.PlacesServiceStatus.OK && place.photos && place.photos.length > 0) {
            const modalHTML = `
              <div id="photo-modal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 p-4">
                <div class="bg-white rounded-lg max-w-4xl w-full max-h-[90vh] overflow-hidden">
                  <div class="flex justify-between items-center p-4 border-b">
                    <h3 class="text-lg font-semibold">Business Photos</h3>
                    <button onclick="document.getElementById('photo-modal').remove()" class="text-gray-500 hover:text-gray-700">
                      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                      </svg>
                    </button>
                  </div>
                  <div class="p-4 overflow-y-auto" style="max-height: calc(90vh - 60px)">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                      ${place.photos.map(photo => `
                        <div class="rounded-lg overflow-hidden">
                          <img src="${photo.getUrl({maxWidth: 800, maxHeight: 600})}" 
                               alt="Business photo" 
                               class="w-full h-auto object-cover">
                        </div>
                      `).join('')}
                    </div>
                  </div>
                </div>
              </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
          } else {
            alert('No photos available for this business');
          }
        });
      };

      const RankGridPage = ({ placeId, businessName, lat, lng }) => {
        const [keywords, setKeywords] = useState('');
        const [centerLat, setCenterLat] = useState(lat || -34.397);
        const [centerLng, setCenterLng] = useState(lng || 150.644);
        const [gridData, setGridData] = useState([]);
        const [competitors, setCompetitors] = useState([]);
        const [logs, setLogs] = useState(JSON.parse(localStorage.getItem('rankLogs') || '[]'));
        const [map, setMap] = useState(null);
        const [websiteData, setWebsiteData] = useState({});

        useEffect(() => {
          const mapInstance = L.map('map').setView([centerLat, centerLng], 13);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
          }).addTo(mapInstance);
          setMap(mapInstance);
          return () => mapInstance.remove();
        }, []);

        useEffect(() => {
          if (map && gridData.length > 0) {
            gridData.forEach(point => {
              const color = point.rank === 1 ? 'green' : point.rank <= 5 ? 'orange' : point.rank > 5 ? 'red' : 'white';
              const marker = L.circleMarker([point.lat, point.lng], {
                radius: 8,
                fillColor: color,
                color: '#000',
                weight: 1,
                opacity: 1,
                fillOpacity: 0.8
              }).addTo(map);
              const tooltipContent = Object.entries(point.ranks).map(([kw, rank]) => 
                `${kw}: Rank ${rank}`
              ).join('<br>');
              marker.bindTooltip(`${tooltipContent}<br>Lat: ${point.lat.toFixed(4)}, Lng: ${point.lng.toFixed(4)}`);
              marker.on('click', () => map.setView([point.lat, point.lng], 15));
            });
          }
        }, [map, gridData]);

        const fetchRankGrid = async () => {
          const kwArray = keywords.split(',').map(k => k.trim()).filter(k => k);
          if (!kwArray.length || !businessName) return;
          setLoading(true);
          try {
            const response = await fetch('/rank-grid', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ keywords: kwArray, businessName, centerLat, centerLng })
            });
            const data = await response.json();
            setGridData(data.grid || []);
            setCompetitors(data.top_competitors || []);
            const log = { timestamp: new Date().toISOString(), keywords: kwArray, businessName, grid: data.grid };
            const newLogs = [...logs, log];
            setLogs(newLogs);
            localStorage.setItem('rankLogs', JSON.stringify(newLogs));
            if (map) map.setView([centerLat, centerLng], 13);
          } catch (error) {
            console.error('Error fetching rank grid:', error);
          }
          setLoading(false);
        };

        const fetchWebsiteData = async (competitorName) => {
          try {
            const response = await fetch(`/website-analysis?name=${encodeURIComponent(competitorName)}`);
            const data = await response.json();
            setWebsiteData(prev => ({ ...prev, [competitorName]: data }));
          } catch (error) {
            console.error('Error fetching website data:', error);
          }
        };

        const exportReport = () => {
          const report = {
            timestamp: new Date().toISOString(),
            businessName,
            keywords: keywords.split(',').map(k => k.trim()),
            grid: gridData,
            competitors: competitors.map(c => ({
              ...c,
              websiteAnalysis: websiteData[c.name] || {}
            }))
          };
          const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${businessName}-rank-report-${new Date().toISOString().split('T')[0]}.json`;
          a.click();
          URL.revokeObjectURL(url);
        };

        const clearCache = () => {
          localStorage.removeItem('rankLogs');
          setLogs([]);
        };

        return (
          <div className="container mx-auto px-4 py-8 max-w-4xl">
            <h2 className="text-2xl font-bold text-gray-800 mb-6">Rank Grid for {businessName}</h2>
            <div className="bg-white rounded-xl shadow-md p-6 mb-8">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Keywords (comma-separated)</label>
                  <input
                    type="text"
                    value={keywords}
                    onChange={(e) => setKeywords(e.target.value)}
                    className="block w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500"
                    placeholder="e.g., salon, spa, haircut"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Business Name</label>
                  <input
                    type="text"
                    value={businessName}
                    readOnly
                    className="block w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-100"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Center Latitude</label>
                  <input
                    type="number"
                    value={centerLat}
                    onChange={(e) => setCenterLat(parseFloat(e.target.value) || -34.397)}
                    className="block w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Center Longitude</label>
                  <input
                    type="number"
                    value={centerLng}
                    onChange={(e) => setCenterLng(parseFloat(e.target.value) || 150.644)}
                    className="block w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500"
                  />
                </div>
              </div>
              <button
                onClick={fetchRankGrid}
                className="mt-4 inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
              >
                Generate Rank Grid
              </button>
              <button
                onClick={exportReport}
                className="mt-4 ml-3 inline-flex items-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
              >
                Export Report
              </button>
            </div>
            <div className="bg-white rounded-xl shadow-md p-6 mb-8">
              <h3 className="text-lg font-semibold text-gray-800 mb-4">5x5 Rank Grid</h3>
              <div id="map"></div>
              <p className="mt-2 text-sm text-gray-600">
                <span className="inline-block w-3 h-3 bg-green-500 rounded-full mr-1"></span> Rank 1
                <span className="inline-block w-3 h-3 bg-orange-500 rounded-full mr-1 ml-4"></span> Rank 2–5
                <span className="inline-block w-3 h-3 bg-red-500 rounded-full mr-1 ml-4"></span> Rank 6+
                <span className="inline-block w-3 h-3 bg-white border border-gray-300 rounded-full mr-1 ml-4"></span> Not found
              </p>
            </div>
            <div className="bg-white rounded-xl shadow-md p-6 mb-8">
              <h3 className="text-lg font-semibold text-gray-800 mb-4">Top Competitors</h3>
              {competitors.length > 0 ? (
                <div className="space-y-4">
                  {competitors.map(c => (
                    <div key={c.name} className="border-b pb-4">
                      <h4 className="text-md font-medium text-gray-700">{c.name}</h4>
                      <button
                        onClick={() => fetchWebsiteData(c.name)}
                        className="mt-2 inline-flex items-center px-3 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50"
                      >
                        Analyze Website
                      </button>
                      {websiteData[c.name] && (
                        <div className="mt-2 text-sm text-gray-600">
                          <p>Page Count: {websiteData[c.name].pageCount || 'N/A'}</p>
                          <p>Last Updated: {websiteData[c.name].lastUpdated || 'N/A'}</p>
                          <p>Mobile Optimization: {websiteData[c.name].mobileOptimized ? 'Yes' : 'No'}</p>
                          <p>Reviews (Last 2 Months): {websiteData[c.name].recentReviews || 'N/A'}</p>
                          <p>Responses (Last 2 Months): {websiteData[c.name].recentResponses || 'N/A'}</p>
                          <p>Photos & Posts (Last Month): {websiteData[c.name].recentMedia || 'N/A'}</p>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              ) : (
                <p className="text-gray-500">No competitors found.</p>
              )}
            </div>
            <div className="bg-white rounded-xl shadow-md p-6 mb-8">
              <h3 className="text-lg font-semibold text-gray-800 mb-4">Weekly Scan Logs</h3>
              <button
                onClick={clearCache}
                className="mb-4 inline-flex items-center px-3 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50"
              >
                Clear Cache
              </button>
              {logs.length > 0 ? (
                <div className="space-y-2">
                  {logs.map((log, i) => (
                    <div key={i} className="text-sm text-gray-600">
                      <p><strong>Time:</strong> {new Date(log.timestamp).toLocaleString()}</p>
                      <p><strong>Business:</strong> {log.businessName}</p>
                      <p><strong>Keywords:</strong> {log.keywords.join(', ')}</p>
                    </div>
                  ))}
                </div>
              ) : (
                <p className="text-gray-500">No scan logs available.</p>
              )}
            </div>
          </div>
        );
      };

      return (
        <div className="container mx-auto px-4 py-8 max-w-4xl">
          <header className="mb-8 text-center">
            <h1 className="text-3xl md:text-4xl font-bold text-gray-800 mb-2">Business Finder</h1>
            <p className="text-gray-600 max-w-lg mx-auto">
              Discover Google My Business verified establishments with complete contact information
            </p>
          </header>
          <div className="bg-white rounded-xl shadow-md p-6 mb-8">
            <div className="relative">
              <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg className="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
              </div>
              <input
                id="search-input"
                type="text"
                value={query}
                onChange={handleSearchInput}
                className="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                placeholder="Search for businesses (e.g. 'restaurants', 'plumbers', 'hotels')"
              />
            </div>
          </div>
          {loading && (
            <div id="loading" className="flex flex-col items-center justify-center py-12">
              <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
              <p className="mt-4 text-gray-600">Searching for businesses...</p>
            </div>
          )}
          <div id="results" className="space-y-4">
            {businesses.map(business => (
              <div key={business.place_id} className="bg-white rounded-xl shadow-sm overflow-hidden hover:shadow-md transition-shadow duration-200">
                <div className="p-6">
                  <div className="flex items-start">
                    {business.icon ? (
                      <img src={business.icon} alt={business.name} className="h-12 w-12 rounded-md object-cover mr-4" />
                    ) : (
                      <div className="h-12 w-12 rounded-md bg-gray-200 flex items-center justify-center mr-4">
                        <svg className="h-6 w-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                        </svg>
                      </div>
                    )}
                    <div className="flex-1">
                      <h3 className="text-lg font-semibold text-gray-900 mb-1">{business.name}</h3>
                      <p className="text-gray-600 text-sm mb-2">{business.formatted_address}</p>
                      {business.types && (
                        <div className="flex flex-wrap gap-1 mb-3">
                          {business.types
                            .filter(t => t !== 'establishment' && t !== 'point_of_interest')
                            .map(type => (
                              <span key={type} className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                                {type.replace(/_/g, ' ')}
                              </span>
                            ))}
                        </div>
                      )}
                      {business.rating && (
                        <div className="flex items-center mb-3">
                          <div className="flex items-center">
                            {Array.from({ length: 5 }).map((_, i) => (
                              <svg key={i} className={`h-4 w-4 ${i < Math.floor(business.rating) ? 'text-yellow-400' : 'text-gray-300'}`} fill="currentColor" viewBox="0 0 20 20">
                                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                              </svg>
                            ))}
                            <span className="ml-1 text-sm font-medium text-gray-700">
                              {business.rating} ({business.user_ratings_total || 0} reviews)
                            </span>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                  <div className="mt-4 pt-4 border-t border-gray-200 flex flex-wrap gap-3">
                    <a href={`https://www.google.com/maps/place/?q=place_id:${business.place_id}`} 
                       target="_blank" 
                       className="inline-flex items-center px-3 py-2 border border-gray-300 shadow-sm text-sm leading-4 font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                      <svg className="-ml-0.5 mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                      </svg>
                      View on Map
                    </a>
                    <div id={`business-details-${business.place_id}`}>
                      <button onClick={() => loadBusinessDetails(business.place_id)} 
                        className="inline-flex items-center px-3 py-2 border border-transparent text-sm leading-4 font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        Load Details
                      </button>
                    </div>
                    <a href="#"
                       onClick={(e) => {
                         e.preventDefault();
                         window.location.hash = `rank-grid?placeId=${business.place_id}&name=${encodeURIComponent(business.name)}&lat=${business.geometry.location.lat()}&lng=${business.geometry.location.lng()}`;
                       }}
                       className="inline-flex items-center px-3 py-2 border border-transparent text-sm leading-4 font-medium rounded-md text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                      View Rank Grid
                    </a>
                  </div>
                </div>
              </div>
            ))}
          </div>
          {noResults && (
            <div id="no-results" className="text-center py-12">
              <svg className="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <h3 className="mt-2 text-lg font-medium text-gray-900">No businesses found</h3>
              <p className="mt-1 text-gray-500">Try a different search term or location.</p>
            </div>
          )}
          {window.location.hash.includes('rank-grid') && (
            <RankGridPage
              placeId={new URLSearchParams(window.location.hash.slice(1)).get('placeId')}
              businessName={decodeURIComponent(new URLSearchParams(window.location.hash.slice(1)).get('name'))}
              lat={parseFloat(new URLSearchParams(window.location.hash.slice(1)).get('lat'))}
              lng={parseFloat(new URLSearchParams(window.location.hash.slice(1)).get('lng'))}
            />
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
