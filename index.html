  <script>
    // Function to get the parent website URL (where the form is embedded)
    function getParentDomain() {
      try {
        // Try to get the parent URL from document.referrer (works in most cases)
        let parentUrl = document.referrer;
        
        // If referrer is empty, try to get from window.parent.location (might be restricted by CORS)
        if (!parentUrl && window.parent && window.parent.location) {
          try {
            parentUrl = window.parent.location.href;
          } catch (e) {
            // Cross-origin restriction - can't access parent location
            console.log('Cannot access parent location due to CORS');
          }
        }
        
        // If we have a parent URL, extract the hostname
        if (parentUrl) {
          try {
            const url = new URL(parentUrl);
            return url.hostname.replace(/^www\./, '');
          } catch (e) {
            console.error('Error parsing parent URL:', e);
          }
        }
        
        // Fallback to a message asking to pass domain as parameter
        // Check if domain is passed as URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const domainParam = urlParams.get('domain');
        if (domainParam) {
          return domainParam;
        }
        
        // Last resort - return empty string and log warning
        console.warn('Could not detect parent domain. Please pass ?domain=yourdomain.com in the iframe src');
        return '';
      } catch (error) {
        console.error('Error getting parent domain:', error);
        return '';
      }
    }

    // Function to extract domain name from URL without TLD
    function extractDomainFromUrl(hostname) {
      try {
        if (!hostname) return '';
        
        let domain = hostname.replace(/^www\./, '');
        const domainParts = domain.split('.');
        
        if (domainParts.length >= 2) {
          const commonMultiTLDs = ['co', 'com', 'org', 'net', 'gov', 'edu', 'ac'];
          
          if (domainParts.length >= 3 && commonMultiTLDs.includes(domainParts[domainParts.length - 2])) {
            return domainParts[0];
          } else {
            return domainParts[0];
          }
        }
        
        return domain;
      } catch (error) {
        console.error('Error extracting domain from URL:', error);
        return '';
      }
    }
