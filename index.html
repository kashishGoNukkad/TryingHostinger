<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            violet: {
              50: '#f5f3ff',
              100: '#ede9fe',
              200: '#ddd6fe',
              300: '#c4b5fd',
              400: '#a78bfa',
              500: '#8b5cf6',
              600: '#7c3aed',
              700: '#6d28d9',
              800: '#5b21b6',
              900: '#4c1d95',
              950: '#2e1065',
            },
            fuchsia: {
              50: '#fdf4ff',
              100: '#fae8ff',
              200: '#f5d0fe',
              300: '#f0abfc',
              400: '#e879f9',
              500: '#d946ef',
              600: '#c026d3',
              700: '#a21caf',
              800: '#86198f',
              900: '#701a75',
              950: '#4a044e',
            },
          },
        }
      }
    }
  </script>
  <style>
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    
    .bg-pattern {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%238b5cf6' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      z-index: -1;
      opacity: 0.6;
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-50 to-blue-50 p-4 md:p-8 flex items-center justify-center bg-pattern">
  <!-- Decorative blobs -->
  <div class="blob bg-violet-300 w-64 h-64 top-0 left-0"></div>
  <div class="blob bg-fuchsia-300 w-80 h-80 bottom-0 right-0"></div>
  <div class="blob bg-pink-200 w-72 h-72 bottom-20 left-20"></div>
  
  <div class="w-full max-w-md relative z-10">
    <div class="bg-white rounded-2xl overflow-hidden shadow-xl transform transition-all">
      <div class="bg-gradient-to-r from-violet-500 to-fuchsia-500 p-6">
        <h2 class="text-2xl font-bold text-white">Contact Us</h2>
        <p class="text-violet-100 mt-1">We'd love to hear from you</p>
      </div>

      <div class="p-6">
        <div id="successMessage" class="hidden flex flex-col items-center justify-center py-8 text-center space-y-4">
          <div class="h-16 w-16 bg-green-100 rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
          </div>
          <h3 class="text-xl font-medium text-gray-900">Thank you!</h3>
          <p class="text-gray-500">Your message has been sent successfully.</p>
          <button id="sendAnother" class="mt-4 px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-violet-500">
            Send another message
          </button>
        </div>

        <form id="queryForm" class="space-y-5">
          <div class="space-y-2">
            <label for="name" class="block text-sm font-medium text-gray-700">
              Name of Merchant
            </label>
            <input
              id="name"
              name="name"
              required
              class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500 transition-all"
              placeholder="Enter your business name"
            />
          </div>

          <div class="space-y-2">
            <label for="email" class="block text-sm font-medium text-gray-700">
              Email of Merchant
            </label>
            <input
              type="email"
              id="email"
              name="email"
              required
              class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500 transition-all"
              placeholder="your@email.com"
            />
          </div>

          <div class="space-y-2">
            <label for="message" class="block text-sm font-medium text-gray-700">
              Message
            </label>
            <textarea
              id="message"
              name="message"
              required
              rows="4"
              class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500 transition-all"
              placeholder="How can we help you?"
            ></textarea>
          </div>

          <button
            type="submit"
            id="submitButton"
            class="w-full bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-700 hover:to-fuchsia-700 text-white font-medium py-2 px-4 rounded-md transition-all duration-200 transform hover:scale-[1.02] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-violet-500"
          >
            Send Message
          </button>
        </form>
      </div>

      <div class="bg-gray-50 px-6 py-4 flex justify-between items-center">
        <div class="flex space-x-2">
          <div class="h-2 w-2 rounded-full bg-violet-500"></div>
          <div class="h-2 w-2 rounded-full bg-fuchsia-500"></div>
          <div class="h-2 w-2 rounded-full bg-pink-500"></div>
        </div>
        <p class="text-xs text-gray-500">Secure & confidential</p>
      </div>
    </div>
    
    <!-- Decorative elements -->
    <div class="absolute -top-10 -right-10 w-20 h-20 bg-gradient-to-br from-violet-400 to-fuchsia-300 rounded-full opacity-20"></div>
    <div class="absolute -bottom-8 -left-8 w-16 h-16 bg-gradient-to-br from-fuchsia-400 to-pink-300 rounded-full opacity-20"></div>
  </div>

  <script>
    // Function to get the parent website URL (where the form is embedded)
    function getParentDomain() {
      try {
        // Try to get the parent URL from document.referrer
        let parentUrl = document.referrer;
        
        // If we have a parent URL, extract the hostname
        if (parentUrl) {
          try {
            const url = new URL(parentUrl);
            return url.hostname.replace(/^www\./, '');
          } catch (e) {
            console.error('Error parsing parent URL:', e);
          }
        }
        
        // Fallback to check if domain is passed as URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const domainParam = urlParams.get('domain');
        if (domainParam) {
          return domainParam;
        }
        
        return '';
      } catch (error) {
        console.error('Error getting parent domain:', error);
        return '';
      }
    }

    // Function to extract domain name without TLD
    function extractDomainName(hostname) {
      try {
        if (!hostname) return '';
        
        let domain = hostname.replace(/^www\./, '');
        const domainParts = domain.split('.');
        
        if (domainParts.length >= 2) {
          // Return the main domain name (first part)
          return domainParts[0];
        }
        
        return domain;
      } catch (error) {
        console.error('Error extracting domain name:', error);
        return '';
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      const queryForm = document.getElementById('queryForm');
      const successMessage = document.getElementById('successMessage');
      const submitButton = document.getElementById('submitButton');
      const sendAnother = document.getElementById('sendAnother');
      
      // Get domain information once when page loads
      const fullDomain = getParentDomain();
      const domainName = extractDomainName(fullDomain);
      
      console.log('Form loaded on domain:', fullDomain);
      console.log('Extracted domain name:', domainName);
      
      // Add hidden fields to form with domain information
      const domainInput = document.createElement('input');
      domainInput.type = 'hidden';
      domainInput.name = 'website_domain';
      domainInput.value = fullDomain;
      queryForm.appendChild(domainInput);
      
      const domainNameInput = document.createElement('input');
      domainNameInput.type = 'hidden';
      domainNameInput.name = 'domain_name';
      domainNameInput.value = domainName;
      queryForm.appendChild(domainNameInput);
      
      const timestampInput = document.createElement('input');
      timestampInput.type = 'hidden';
      timestampInput.name = 'timestamp';
      timestampInput.value = new Date().toISOString();
      queryForm.appendChild(timestampInput);
      
      // Handle form submission
      queryForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        submitButton.disabled = true;
        submitButton.innerText = 'Sending...';
        
        try {
          // Get form data
          const formData = new FormData(queryForm);
          
          // Convert to object for easier handling
          const formObject = {};
          formData.forEach((value, key) => {
            formObject[key] = value;
          });
          
          console.log('Form data ready to be sent to parent script:', formObject);
          
          // Option 1: If your parent website script listens for messages
          if (window.parent) {
            // Send data to parent window
            window.parent.postMessage({
              type: 'formSubmission',
              data: formObject
            }, '*'); // In production, replace '*' with your actual domain
          }
          
          // Option 2: If you want to submit to a specific endpoint
          // You can uncomment and modify this:
          /*
          const response = await fetch('https://your-hostinger-endpoint.com/submit-form', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(formObject)
          });
          */
          
          // Show success message
          queryForm.classList.add('hidden');
          successMessage.classList.remove('hidden');
          successMessage.classList.add('animate-fade-in');
          
          // Reset form
          queryForm.reset();
          
        } catch (error) {
          console.error('Error submitting form:', error);
          alert('There was an error submitting the form. Please try again.');
        } finally {
          submitButton.disabled = false;
          submitButton.innerText = 'Send Message';
        }
      });
      
      // Handle "Send another message" button click
      sendAnother.addEventListener('click', function() {
        successMessage.classList.add('hidden');
        queryForm.classList.remove('hidden');
      });
    });
  </script>
</body>
</html>
